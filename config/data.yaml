dates:
  start: "2015-01-01"
  end: "2026-06-16"

# yfinance tickers for related instruments (all on US exchanges, very clean)
tickers:
  soybean_oil: "ZL=F"   # CBOT soybean oil continuous
  brent: "BZ=F"          # ICE Brent crude continuous
  wti: "CL=F"            # NYMEX WTI crude continuous
  usdmyr: "MYR=X"        # USD/MYR spot

fcpo:
  # Tried in order; coverage is inconsistent — fall back to manual CSV if empty
  yfinance_candidates:
    - "FCPO.KL"
    - "KPO=F"
  # Any *.csv placed in data/raw/fcpo/ is auto-detected (Investing.com or standard OHLCV)

paths:
  raw: "data/raw"
  processed: "data/processed"
  features: "data/features"
  models: "models"
  results: "results"

# News sentiment (GDELT, free, no key). Queries are tunable.
# GDELT DOC 2.0 tone coverage is reliable from ~2017 onward; earlier rows will be
# blank, which the gradient-boosted model handles natively.
news:
  start: "2017-01-01"
  topics:
    palm_oil: '"palm oil"'
    crude_oil: '"crude oil" OR brent'           # biodiesel link to palm
    soybean: 'soybean OR soyoil'                 # substitute oil / crop news
    weather_palm: '(drought OR "el nino" OR "la nina" OR monsoon OR flood) (palm OR malaysia OR indonesia)'
